---
# ansible/playbooks/ticket01_lamp.yml
# Provisions the LAMP stack on ticket01 (192.168.56.105) for osTicket.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/ticket01_lamp.yml \
#     --ask-vault-pass
#
# Dependencies:
#   - vault.yml must be encrypted and contain vault_mysql_root_password
#     and vault_osticket_db_password

- name: ticket01 — LAMP Stack Provisioning
  hosts: ticketing
  become: true
  # vars_files intentionally omitted — Ansible auto-loads group_vars/all/vault.yml
  # when invoked with: ansible-playbook -i inventory/hosts.ini ... --ask-vault-pass

  vars:
    php_extensions:
      - php8.3
      - php8.3-mysql
      - php8.3-xml
      - php8.3-mbstring
      - php8.3-imap
      - php8.3-gd
      - php8.3-intl
      - php8.3-apcu
      - php8.3-curl
      - php8.3-zip
      - libapache2-mod-php8.3
    apache_modules:
      - rewrite
      - headers
    osticket_db_name: osticket
    osticket_db_user: osticket_user

  tasks:

    # -----------------------------------------------------------------------
    # 1. System prep
    # -----------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - software-properties-common
          - unzip
          - curl
          - gnupg
        state: present

    # -----------------------------------------------------------------------
    # 2. Apache
    # -----------------------------------------------------------------------
    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Enable required Apache modules
      apache2_module:
        name: "{{ item }}"
        state: present
      loop: "{{ apache_modules }}"
      notify: Restart Apache

    - name: Start and enable Apache2
      systemd:
        name: apache2
        state: started
        enabled: true

    # -----------------------------------------------------------------------
    # 3. PHP 8.3
    # -----------------------------------------------------------------------
    - name: Add ondrej/php PPA (provides PHP 8.3 on Ubuntu 24.04)
      apt_repository:
        repo: ppa:ondrej/php
        state: present
        update_cache: true

    - name: Install PHP 8.3 and required extensions
      apt:
        name: "{{ php_extensions }}"
        state: present
      notify: Restart Apache

    - name: Verify PHP version
      command: php -v
      register: php_version_output
      changed_when: false

    - name: Display PHP version
      debug:
        msg: "{{ php_version_output.stdout_lines[0] }}"

    # -----------------------------------------------------------------------
    # 4. MySQL 8
    # -----------------------------------------------------------------------
    - name: Install MySQL Server and Python connector
      apt:
        name:
          - mysql-server
          - python3-pymysql   # required for Ansible mysql_* modules
        state: present

    - name: Start and enable MySQL
      systemd:
        name: mysql
        state: started
        enabled: true

    - name: Set MySQL root password
      mysql_user:
        name: root
        host: localhost
        password: "{{ vault_mysql_root_password }}"
        login_unix_socket: /var/run/mysqld/mysqld.sock
        state: present
      no_log: true

    - name: Create osTicket database
      mysql_db:
        name: "{{ osticket_db_name }}"
        encoding: utf8mb4
        collation: utf8mb4_unicode_ci
        state: present
        login_user: root
        login_password: "{{ vault_mysql_root_password }}"
      no_log: true

    - name: Create osTicket database user
      mysql_user:
        name: "{{ osticket_db_user }}"
        host: localhost
        password: "{{ vault_osticket_db_password }}"
        priv: "{{ osticket_db_name }}.*:ALL"
        state: present
        login_user: root
        login_password: "{{ vault_mysql_root_password }}"
      no_log: true

    # -----------------------------------------------------------------------
    # 5. Remove default MySQL anonymous users and test database
    # -----------------------------------------------------------------------
    - name: Remove anonymous MySQL users
      mysql_user:
        name: ""
        host_all: true
        state: absent
        login_user: root
        login_password: "{{ vault_mysql_root_password }}"
      no_log: true

    - name: Remove MySQL test database
      mysql_db:
        name: test
        state: absent
        login_user: root
        login_password: "{{ vault_mysql_root_password }}"
      no_log: true

    # -----------------------------------------------------------------------
    # 6. Verification
    # -----------------------------------------------------------------------
    - name: Verify required PHP extensions are loaded
      command: php -m
      register: php_modules
      changed_when: false

    - name: Assert critical PHP extensions present
      assert:
        that:
          - "'mysqli' in php_modules.stdout"
          - "'xml' in php_modules.stdout"
          - "'mbstring' in php_modules.stdout"
          - "'gd' in php_modules.stdout"
          - "'intl' in php_modules.stdout"
          - "'apcu' in php_modules.stdout"
          - "'curl' in php_modules.stdout"
          - "'zip' in php_modules.stdout"
        fail_msg: "One or more required PHP extensions are missing. Run: php -m"
        success_msg: "All required PHP extensions verified."

    - name: Check Apache is responding
      uri:
        url: http://localhost/
        status_code: [200, 301, 302]
      register: apache_check
      retries: 3
      delay: 5

  handlers:
    - name: Restart Apache
      systemd:
        name: apache2
        state: restarted
