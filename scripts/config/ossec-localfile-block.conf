<!--
  ossec-localfile-block.conf
  ==========================
  Add this <localfile> block inside the <ossec_config> section of:
    C:\Program Files (x86)\ossec-agent\ossec.conf
  on each Windows VM (dc01, dc02, wkstn01).

  This configures the Wazuh agent to collect Windows Security events
  and filter to only the EventIDs relevant to AD attack detection.

  After adding, restart the agent:
    NET STOP WazuhSvc && NET START WazuhSvc
-->

<ossec_config>
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>
      <![CDATA[
        Event/System[
          EventID=4624 or
          EventID=4625 or
          EventID=4648 or
          EventID=4662 or
          EventID=4663 or
          EventID=4672 or
          EventID=4720 or
          EventID=4728 or
          EventID=4732 or
          EventID=4756 or
          EventID=4768 or
          EventID=4769 or
          EventID=4771 or
          EventID=4776
        ]
      ]]>
    </query>
  </localfile>
</ossec_config>

<!--
  EventID Reference:
  4624  Successful logon
  4625  Failed logon (password spray indicator)
  4648  Logon with explicit credentials (lateral movement indicator)
  4662  Operation on AD object (privilege escalation)
  4663  Object access attempt
  4672  Special privileges assigned (privilege escalation)
  4720  User account created (rogue account indicator)
  4728  Member added to global group (Domain Admins change)
  4732  Member added to local group
  4756  Member added to universal group
  4768  Kerberos TGT requested
  4769  Kerberos service ticket requested (Kerberoasting indicator)
  4771  Kerberos pre-auth failed
  4776  NTLM authentication attempt
-->
